title: "CL3 Blog"
description: "CL3 Platform 開發週記與產品演進紀錄"
author: "Michael"
lang: "zh-TW"
timezone: "Asia/Taipei"
url: "https://michael007.github.io"
baseurl: "/cl3-blog"

theme: minima
markdown: kramdown
permalink: /:categories/:year/:month/:day/:title/

plugins:
  - jekyll-feed
  - jekyll-seo-tag

minima:
  social_links:
    - { platform: github,  user_url: "https://github.com/YOUR_USERNAME" }

header_pages:
  - about.md

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: post
  - scope:
      path: ""
      type: "pages"
    values:
      layout: page
